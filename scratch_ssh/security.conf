# ==========================================
# GLOBAL KIBERXAVFSIZLIK QALQONI (NGINX)
# ==========================================

# 1. Server haqidagi ma'lumotlarni yashirish (Server Tokens)
server_tokens off;

# 2. Xavfsizlik Sarlavhalari (Security Headers)
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# 3. O'ta katta so'rov va fayllar orqali buzishdan himoya (Buffer Overflow)
client_body_buffer_size 16k;
client_header_buffer_size 1k;
client_max_body_size 20m;
large_client_header_buffers 4 8k;

# 4. Kuttirib ulanib olinadigan (Slowloris) hujumlarga qarshi himoya
client_body_timeout 15;
client_header_timeout 15;
keepalive_timeout 20;
send_timeout 15;

# 5. Global DDoS himoyasi uchun IP xotira zonalari
limit_req_zone $binary_remote_addr zone=global_ddos_limit:10m rate=40r/s;
limit_conn_zone $binary_remote_addr zone=global_conn_limit:10m;

# 6. Yuqoridagi mudofaani BARCHA loyihalarga faollashtirish
limit_conn global_conn_limit 30;
limit_req zone=global_ddos_limit burst=60 nodelay;
